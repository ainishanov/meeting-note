name: Question
description: Ask for help using or configuring Meeting Note.
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include your OS, install method, and relevant settings. Do not include API keys.
