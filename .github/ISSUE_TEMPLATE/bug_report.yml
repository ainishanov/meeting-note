name: Bug report
description: Report something that is broken or unreliable.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
      placeholder: Recording freezes when I click Stop...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Meeting Note
        2. Start recording
        3. Click Stop
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove meeting content, API keys, and private paths before posting.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys, private meeting content, and personal data from this report.
          required: true
